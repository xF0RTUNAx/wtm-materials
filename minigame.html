<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xFORTUNAx Giveaway Promo</title>
    <style>
        * { box-sizing: border-box; } 
        
        :root {
            --bg-color: #0d1117; 
            --panel-bg: rgba(15, 20, 25, 0.85); 
            --accent-gold: #ffc107; 
        }

        html, body { overflow-x: hidden; } 

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: #c9d1d9; 
            text-align: center; 
            margin: 0; 
            min-height: 100vh; 
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color); 
            background-image: url('https://static.wtmobile.com/upload/fileman/images/wallpapers/26_02_chinesetanks/1080x2340_wtm_chinese_armor_6e942bb822bb83f56174ea3f1effbd29.jpg');
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 
        }

        .container { 
            max-width: 600px; 
            width: 90%;
            background: var(--panel-bg); 
            padding: 40px 25px; 
            border-radius: 12px; 
            border: 1px solid var(--accent-gold); 
            box-shadow: 0 8px 30px rgba(0,0,0,0.9); 
            backdrop-filter: blur(15px); 
        }
        
        h1 { 
            color: var(--accent-gold); 
            font-size: 32px; 
            margin-top: 0; 
            text-transform: uppercase; 
            text-shadow: 0 0 15px rgba(255, 193, 7, 0.4);
            letter-spacing: 1px;
        }
        
        .desc { 
            font-size: 16px; 
            margin-bottom: 25px; 
            line-height: 1.5; 
        }
        
        .prize-pool {
            background: rgba(255,193,7,0.1); 
            border: 1px solid var(--accent-gold);
            border-radius: 8px; 
            padding: 20px; 
            margin-bottom: 30px; 
            font-size: 16px;
            font-weight: bold;
        }
        
        .prize-pool h3 { 
            margin-top: 0; 
            color: #fff; 
            margin-bottom: 15px; 
            font-size: 20px;
        }
        
        .btn-home {
            display: inline-block; 
            padding: 15px 30px; 
            background-color: var(--accent-gold);
            color: #000; 
            text-decoration: none; 
            border-radius: 6px; 
            font-weight: bold; 
            font-size: 16px; 
            transition: 0.2s;
            text-transform: uppercase;
        }
        
        .btn-home:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 4px 15px rgba(255, 193, 7, 0.4); 
            filter: brightness(1.1); 
        }

        @media (max-width: 600px) {
            h1 { font-size: 26px; }
            .container { padding: 30px 15px; }
            .prize-pool { font-size: 14px; }
            .prize-pool h3 { font-size: 18px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Розыгрыш скоро начнется!</h1>
        <div class="desc">
            Глобальная операция находится на стадии подготовки. Командование собирает ресурсы для старта. Следите за новостями на канале!
        </div>
        
        <div class="prize-pool">
            <h3>🏆 ПРИЗОВОЙ ФОНД: 2000 ПЛАТИНЫ</h3>
            <div>🥇 1 Место — 1000 Платины</div>
            <div style="margin: 8px 0;">🥈 2 Место — 500 Платины</div>
            <div>🥉 3 Место — 500 Платины</div>
        </div>
        
        <a href="index.html" class="btn-home">🏠 На главную</a>
    </div>

</body>
</html>
